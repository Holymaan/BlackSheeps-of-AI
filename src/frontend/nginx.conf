server {
    listen 80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # ── API proxy ────────────────────────────────────────────────────────────
    # Forward every request whose path starts with a known API prefix to the
    # backend container.  This mirrors the Vite dev-server proxy config.
    location ~ ^/(form|auth|health|schools|routing|openapi) {
        proxy_pass         http://api:5058;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── SPA fallback ─────────────────────────────────────────────────────────
    # React Router handles client-side navigation; serve index.html for every
    # path that is not a static asset.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
